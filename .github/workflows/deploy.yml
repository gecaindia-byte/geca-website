Step 1: Delete the current index.html (wrong format)
Go to your repo: https://github.com/gecaindia-byte/geca-website
Click on index.html
Click the trash icon (🗑️) on the right side
Click "Commit changes"
Step 2: Create GitHub Actions Workflow
This will automatically build your website!

Click "Add file" → "Create new file"
In filename, type: .github/workflows/deploy.yml
Copy-paste this:
name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install and Build
      run: |
        npm install
        npm run build
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build
